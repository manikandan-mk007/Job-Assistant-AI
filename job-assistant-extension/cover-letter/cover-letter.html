<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Cover Letter</title>
  <link rel="stylesheet" href="cover-letter.css" />
</head>
<body>
  <main class="container">
    <div class="header">
      <h1>Cover Letter<span>.</span></h1>
      <p>Generate and copy your tailored cover letter</p>
    </div>

    <div class="card">
      <div class="row">
        <button id="generateBtn">Generate / Refresh</button>
        <button id="copyBtn" class="secondary">Copy</button>
      </div>
      <p id="message" class="message"></p>
    </div>

    <div class="card">
      <textarea id="coverLetterText" placeholder="Cover letter will appear here…"></textarea>
    </div>
  </main>

  <script src="cover-letter.js"></script>
</body>
</html>
